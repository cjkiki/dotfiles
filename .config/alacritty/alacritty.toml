[font]
size = 14.0
normal = { family = "Iosevka Nerd Font", style = "Regular" }
bold = { family = "Iosevka Nerd Font", style = "Bold" }
italic = { family = "Iosevka Nerd Font", style = "Italic" }

[colors.primary]
background = "#0e0e0f"
foreground = "#cdd6f4"

[cursor]
style.shape = "Block"
style.blinking = "On"
blink_interval = 500

[general]
live_config_reload = true

[mouse]
hide_when_typing = true

[scrolling]
history = 10000
multiplier = 3

[selection]
save_to_clipboard = true
